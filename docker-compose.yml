version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cyberrange_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cyberrange_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cyberrange_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://cyberrange_admin:${POSTGRES_PASSWORD:-changeme_in_prod}@db:5432/cyberrange_db
      - JWT_SECRET=${JWT_SECRET:-replace_this_with_a_long_random_secret}
      - JWT_ALGORITHM=HS256
      - JWT_EXPIRE_MINUTES=60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - backend_data:/app/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - cyberrange_net

  db:
    image: postgres:16-alpine
    container_name: cyberrange_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=cyberrange_admin
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme_in_prod}
      - POSTGRES_DB=cyberrange_db
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cyberrange_admin -d cyberrange_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cyberrange_net

networks:
  cyberrange_net:
    driver: bridge

volumes:
  db_data:
  backend_data:
